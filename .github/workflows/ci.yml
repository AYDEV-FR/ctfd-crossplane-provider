name: CI

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

env:
  GOLANGCI_VERSION: v2.1.2

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          files=$(gofmt -l $(git ls-files '*.go' | grep -v zz_generated) || true)
          if [ -n "$files" ]; then echo "Unformatted files:"; echo "$files"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # Build golangci-lint with the repo's Go toolchain: a pre-built binary is
        # compiled with an older Go and refuses to lint code targeting a newer
        # Go than itself.
        run: |
          go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_VERSION}"
          "$(go env GOPATH)/bin/golangci-lint" run ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go test -race ./...

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/ctfd
