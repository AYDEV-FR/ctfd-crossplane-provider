name: Release CTFd Helm chart

# Publishes charts/ctfd to GHCR as an OCI artifact when a chart tag is pushed
# (e.g. chart-v0.1.0) or manually.
on:
  push:
    tags:
      - "chart-v*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: helm registry login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Package and push chart
        run: |
          helm package charts/ctfd -d _output/charts
          helm push _output/charts/ctfd-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
