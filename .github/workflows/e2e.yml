name: E2E

# Spins up kind + CTFd + Crossplane + the provider and asserts, through the CTFd
# API, that the example Challenge/Page/Theme resources were reconciled. See
# test/e2e/run.sh.
on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: azure/setup-helm@v4

      - name: Install kind and kubectl
        run: |
          go install sigs.k8s.io/kind@v0.31.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          curl -sSLo /tmp/kubectl "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl

      - name: Run e2e
        run: ./test/e2e/run.sh
