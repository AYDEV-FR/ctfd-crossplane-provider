# A Theme is an instance-wide singleton: keep a single Theme resource per CTFd
# instance. It writes the theme-related CTFd configuration keys and leaves every
# other setting untouched. Deleting it does not revert CTFd to a prior theme.
apiVersion: resources.ctfd.crossplane.io/v1alpha1
kind: Theme
metadata:
  name: instance-theme
  namespace: default
spec:
  forProvider:
    name: core-beta
    header: |
      <style>:root { --bs-primary: #6f42c1; }</style>
    footer: |
      <p class="text-center">Powered by Crossplane &middot; barbhack</p>
    settings: |
      {"theme_color": "#6f42c1"}
  providerConfigRef:
    name: example
    kind: ClusterProviderConfig
