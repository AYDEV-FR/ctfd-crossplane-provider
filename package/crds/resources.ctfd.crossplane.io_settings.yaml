---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: settings.resources.ctfd.crossplane.io
spec:
  group: resources.ctfd.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - ctfd
    kind: Settings
    listKind: SettingsList
    plural: settings
    singular: settings
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .status.atProvider.name
      name: CTF
      type: string
    - jsonPath: .status.atProvider.theme
      name: THEME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Settings configures the instance-wide CTFd settings (admin "Config"
          page).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A SettingsSpec defines the desired state of Settings.
            properties:
              forProvider:
                description: |-
                  SettingsParameters configure the instance-wide CTFd settings (the admin
                  "Config" page). Settings is a singleton: keep a single Settings resource per
                  CTFd instance. Every field maps to a CTFd configuration key and is optional —
                  only the fields you set are written, so unset fields keep CTFd's value and do
                  not cause perpetual updates.
                properties:
                  accountVisibility:
                    description: |-
                      AccountVisibility: "public", "private", or "admins"
                      ("account_visibility").
                    enum:
                    - public
                    - private
                    - admins
                    type: string
                  challengeRatings:
                    description: ChallengeRatings enables challenge ratings ("challenge_ratings").
                    type: string
                  challengeVisibility:
                    description: |-
                      ChallengeVisibility: "public", "private", or "admins"
                      ("challenge_visibility").
                    enum:
                    - public
                    - private
                    - admins
                    type: string
                  defaultLocale:
                    description: DefaultLocale is the default UI language, e.g. "en"
                      ("default_locale").
                    type: string
                  description:
                    description: Description of the CTF ("ctf_description").
                    type: string
                  end:
                    description: End is the competition end time, as a Unix timestamp
                      string ("end").
                    type: string
                  freeze:
                    description: |-
                      Freeze is the scoreboard freeze time, as a Unix timestamp string
                      ("freeze").
                    type: string
                  hintsFreePublicAccess:
                    description: |-
                      HintsFreePublicAccess lets anonymous users see free hints
                      ("hints_free_public_access").
                    type: boolean
                  htmlSanitization:
                    description: HTMLSanitization enables HTML sanitization ("html_sanitization").
                    type: boolean
                  mail:
                    description: Mail configures outbound email (the Integrations
                      > Email section).
                    properties:
                      passwordSecretRef:
                        description: |-
                          PasswordSecretRef references a Secret key holding the SMTP password
                          ("mail_password"). Provide the password via a Secret rather than inline.
                        properties:
                          key:
                            description: The key to select.
                            type: string
                          name:
                            description: Name of the secret.
                            type: string
                          namespace:
                            description: Namespace of the secret.
                            type: string
                        required:
                        - key
                        - name
                        - namespace
                        type: object
                      port:
                        description: Port is the SMTP port ("mail_port").
                        type: string
                      server:
                        description: Server is the SMTP host ("mail_server").
                        type: string
                      ssl:
                        description: SSL enables implicit TLS ("mail_ssl").
                        type: boolean
                      tls:
                        description: TLS enables STARTTLS ("mail_tls").
                        type: boolean
                      useAuth:
                        description: UseAuth enables SMTP authentication ("mail_useauth").
                        type: boolean
                      username:
                        description: Username for SMTP auth ("mail_username").
                        type: string
                    type: object
                  name:
                    description: Name of the CTF ("ctf_name").
                    type: string
                  nameChanges:
                    description: NameChanges allows players to change their name ("name_changes").
                    type: boolean
                  paused:
                    description: Paused pauses the CTF when true ("paused").
                    type: boolean
                  privacyText:
                    description: PrivacyText is the inline privacy policy ("privacy_text").
                    type: string
                  privacyURL:
                    description: PrivacyURL links to the privacy policy ("privacy_url").
                    type: string
                  registrationCode:
                    description: RegistrationCode required to register, if set ("registration_code").
                    type: string
                  registrationVisibility:
                    description: |-
                      RegistrationVisibility: "public", "private", "mlc", or "admins"
                      ("registration_visibility").
                    type: string
                  robotsTxt:
                    description: RobotsTxt is the content served at /robots.txt ("robots_txt").
                    type: string
                  scoreVisibility:
                    description: |-
                      ScoreVisibility: "public", "private", "hidden", or "admins"
                      ("score_visibility").
                    enum:
                    - public
                    - private
                    - hidden
                    - admins
                    type: string
                  start:
                    description: Start is the competition start time, as a Unix timestamp
                      string ("start").
                    type: string
                  teamSize:
                    description: TeamSize caps the number of members per team ("team_size").
                    type: integer
                  theme:
                    description: Theme is the active CTFd theme, e.g. "core-beta"
                      ("ctf_theme").
                    type: string
                  themeFooter:
                    description: ThemeFooter is custom HTML injected into the footer
                      ("theme_footer").
                    type: string
                  themeHeader:
                    description: ThemeHeader is custom HTML injected into the <head>
                      ("theme_header").
                    type: string
                  themeSettings:
                    description: ThemeSettings is a theme-specific JSON document ("theme_settings").
                    type: string
                  tosText:
                    description: TOSText is the inline terms of service ("tos_text").
                    type: string
                  tosURL:
                    description: TOSURL links to the terms of service ("tos_url").
                    type: string
                  userMode:
                    description: UserMode is "users" or "teams" ("user_mode").
                    enum:
                    - users
                    - teams
                    type: string
                  verifyEmails:
                    description: |-
                      VerifyEmails requires email verification on registration
                      ("verify_emails").
                    type: boolean
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: A SettingsStatus represents the observed state of Settings.
            properties:
              atProvider:
                description: SettingsObservation are the observable fields of Settings.
                properties:
                  name:
                    description: Name of the CTF as reported by CTFd.
                    type: string
                  theme:
                    description: Theme as reported by CTFd.
                    type: string
                  userMode:
                    description: UserMode as reported by CTFd.
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
